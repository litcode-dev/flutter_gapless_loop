name: flutter_gapless_loop
description: "True sample-accurate gapless audio looping on iOS, Android, macOS, and Windows. Zero-gap, zero-click loop playback for music production apps."
version: 0.0.8
homepage: https://github.com/litcode-dev/flutter_gapless_loop
repository: https://github.com/litecode-dev/flutter_gapless_loop
issue_tracker: https://github.com/litecode-dev/flutter_gapless_loop/issues

topics:
  - audio
  - loop
  - music
  - player
  - avaudiosession

environment:
  sdk: ^3.11.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterGaplessLoopPlugin
        sharedDarwinSource: true
      android:
        package: com.fluttergaplessloop
        pluginClass: FlutterGaplessLoopPlugin
      macos:
        pluginClass: FlutterGaplessLoopPlugin
        sharedDarwinSource: true
      windows:
        pluginClass: FlutterGaplessLoopPlugin
      web:
        pluginClass: FlutterGaplessLoopWeb
        fileName: flutter_gapless_loop_web.dart
