name: flutter_gapless_loop
description: "True sample-accurate gapless audio looping on iOS (AVAudioEngine) and Android (AudioTrack). Zero-gap, zero-click loop playback for music production apps."
version: 0.0.6
homepage: https://github.com/litcode-dev/flutter_gapless_loop
repository: https://github.com/litecode-dev/flutter_gapless_loop
issue_tracker: https://github.com/litecode-dev/flutter_gapless_loop/issues

topics:
  - audio
  - loop
  - music
  - player
  - avaudiosession

environment:
  sdk: ^3.11.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterGaplessLoopPlugin
      android:
        package: com.fluttergaplessloop
        pluginClass: FlutterGaplessLoopPlugin
